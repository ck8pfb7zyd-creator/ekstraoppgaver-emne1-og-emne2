<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spørreundersøkelse</title>
</head>
<body>
    
    <div id="app"></div>

    <!--
    Oppgaven krever:
    - MVC
    - Arrays + objekter
    - Map()
    - State(index + svar)
    - Dynamisk UI 
    -->

    <script>

        //Model
        let model = {
            spørsmål: [
                {
                    tekst:"Hvor gammel er du?",
                    alternativer: ["15-25", "25-35", "35-45"]
                },

                { 
                    tekst: "Driver du med noe idrett?",
                    alternativer: ["Ja", "Nei", "Har andre hobbyer"]
                },

                {
                    tekst: "Hvor ofte er du aktiv?",
                    alternativer: ["1-2 ganger i uka", "3-4 dager i uka", "5-6 dager i uka", "Hver dag"]

                }
            ], 
            index: 0, //hvilket spørsmål er vi på 
            svar: []  // lagrer brukerens svar(index)

            
        }; 

        vis(); 

        //View
        function vis() {

            //hvis ferdig -> vis resultatet 
            if (model.index >= model.spørsmål.length) {
                visResultat();
                return; 
            }

            //henter nåværende spørsmål
            let spørsmål = model.spørsmål[model.index]; 

            //viser spørsmål + alternativer 
            document.getElementById("app").innerHTML = `
            <h2>${spørsmål.tekst}</h2>
            ${spørsmål.alternativer.map((alt, i) => `
            <button onclick="velgSvar(${i})">${alt}</button>
            `).join("")}
            `; 

        
        }

        //Controller 
        //når brukeren klikker et svar 
        function velgSvar(i) {

            //lagrer hvilket svar som ble valgt 
            model.svar[model.index] = i;

            //går til neste spørsmål 
            model.index++;

            vis(); 
            
        }

        function visResultat() {
            let html = "<h2>Resultat</h2>"; 

            //går gjennom alle spørsmål 
            for (let i = 0; i < model.spørsmål.length; i++) {
                let spm = model.spørsmål[i];
                let svarIndex = model.svar[i]; 

                html += `
                <p>
                    ${spm.alternativer[svarIndex]}</br>
                
                </p>

                `; 
            }

            document.getElementById("app").innerHTML = html; 
        
        }


    </script>
   

</body>
</html>
