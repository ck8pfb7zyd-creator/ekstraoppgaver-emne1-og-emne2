<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sjakk</title>
</head>
<body>
    
    <div id="app"></div>

    <!--
    Plan for oppgaven: 
    Steg 1 ->
    - Lage et 8x8 bett(array i array)+
    Steg 2 ->
    - Tegne brettet i HTML(vis)
    Steg 3 ->
    - Kunne klikke på ruter 
    Steg 4 ->
    - Legge inn brikker
    Steg 5 ->
    - Velge en brikke
    Steg 6 ->
    - Flytte en brikke
    Steg 7: 
    - Regler(hvordan brikker kan bevege seg)
    -->

<script>

//Model
//model holder all data 
let model = {
    brett: [],         //2D-aray som representerer brettet 
    valgt: null,       //hvilken rute som er valgt(objekt med rad/kol)
    muligeTrekk: []    //liste over lovlige trekk for valgt brikke 
};


//lag brett
//ytre loop = rader 
for (let rad = 0; rad < 8; rad++) {
    let row = [];

    //indre loop = kolonner 
    for (let kol = 0; kol < 8; kol++) {
        row.push("");
    }

    model.brett.push(row);
}

//legger inn bønder på rad 1
for (let kol = 0; kol < 8; kol++) {
    model.brett[1][kol] = "♟"; 
}

//legger inn to hester 
model.brett[0][1] = "♞";
model.brett[0][6] = "♞";


//View
vis();

function vis() {
    //starter med container(hele brettet)
    let html = `
    <div style="
    display:grid;
    grid-template-columns: repeat(8, 50px); 

    width:400px; 
    height: 400px;

    border: 6px solid #3e2723; 
    border-radius: 10px; 

    padding: 8px;

    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    background: #4a2c40
    ">
    
 `;

    //gå gjennom alle rader 
    for (let rad = 0; rad < 8; rad++) {

        //gå gjennom alle kolonner 
        for (let kol = 0; kol < 8; kol++) {

            //farge på ruter, annenhver lys/mørk 
            let farge = (rad + kol) % 2 === 0 ? "#f8ecd4" : "#4a2c40";

            //valgt rute
            if (model.valgt &&
                model.valgt.rad === rad &&
                model.valgt.kol === kol) {
                farge = "#cde7d8";
            }

            //mulige trekk
            for (let i = 0; i < model.muligeTrekk.length; i++) {
                let m = model.muligeTrekk[i];
                if (m.rad === rad && m.kol === kol) {
                    farge = "#e6d3a3";
                }
            }

            //lag HTML for en rute 
            html += `
                <div onclick="klikk(${rad}, ${kol})"
                    style="
                        width:50px;
                        height:50px;
                        background:${farge};
                        display: flex; 
                        text-align:center;
                        justify-content:center; 
                        font-size:30px;
                    ">
                    ${model.brett[rad][kol]}
                </div>
            `;
        }
    }

    html += "<br>";
    document.getElementById("app").innerHTML = html;
}


//Controller 
function klikk(rad, kol) {

    //Steg 1: velg brikke
    if (model.valgt === null) {

        //hvis tom rute -> gjør ingenting 
        if (model.brett[rad][kol] === "") return;

        //lagre valgt rute
        model.valgt = { rad: rad, kol: kol };

        //nullstill gamle trekk 
        model.muligeTrekk = [];

        let brikke = model.brett[rad][kol];

       if (brikke === "♟") {

        //bonde går en frem(nedover)
        let nyRad = rad + 1;

        //sjekk at det ikke går utenfor brettet 
        if (nyRad < 8) {
            model.muligeTrekk.push({rad: nyRad, kol: kol}); 
        }

    }

    if (brikke === "♞") {

        //alle mulige L-trekk 
        let moves = [
            {r: rad - 2, k: kol + 1},
            {r: rad - 2, k: kol - 1},
            {r: rad + 1, k: kol + 2},
            {r: rad + 1, k: kol - 2},
            {r: rad - 1, k: kol + 2},
            {r: rad - 1, k: kol - 2}  
        ]; 

        //filtrerer bort trekk utenfor brettet 
        for (let i = 0; i < moves.length; i++) {
            let m = moves[i]; 

            if (m.r >= 0 && m.r < 8 && m.k >= 0 && m.k < 8) {
                model.muligeTrekk.push({rad: m.r, kol: m.k}); 
            }
        }
    }

    } else 
    
    {  let lov = false;
        
        //sjekk om klikket er et lovlig trekk 
        for(let i = 0; i < model.muligeTrekk.length; i++) {
        let m = model.muligeTrekk[i]; 

        if (m.rad === rad && m.kol === kol) {
            lov = true; 
        }
        }

        //hvis lovlig -> flytt brikken 
        if(lov) {
            let fra = model.valgt; 

            model.brett[rad][kol] = model.brett[fra.rad][fra.kol];
            model.brett[fra.rad][fra.kol] = ""; 
        }

        //nullstill valg uansett 
        model.valgt = null; 
        model.muligeTrekk = []; 

        
    }

    vis();
}

</script>

</body>
</html>
